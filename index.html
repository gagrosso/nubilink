/* =====================================================================
   THE FILM LAYER — GSAP + Lenis, with a strict teardown/init lifecycle
   around the existing innerHTML-based render(). Degrades gracefully.
   ===================================================================== */
const app = document.getElementById('app');
let lenis = null;
const film = { mm:null, splits:[], shader:null, carousel:null, cloud:null };
const prefersReduce = () => window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ---- WebGL aurora hero ---- */
/* 3D particle "cloud" hero centerpiece (Three.js) — glowing nebula that drifts,
   rotates and reacts to the cursor. Replaces the flat SVG diagram. */
function startNetwork(container){
  if(!window.THREE) return null;
  const W=container.clientWidth, H=container.clientHeight;
  if(W<4||H<4) return null;
  const coarse = !!(window.matchMedia && window.matchMedia('(pointer:coarse)').matches);
  const hasBloom = !!(THREE.EffectComposer && THREE.RenderPass && THREE.UnrealBloomPass);
  const useBloom = hasBloom && !coarse;   // skip the heavier post-pass on touch devices
  let renderer;
  try{ renderer=new THREE.WebGLRenderer({alpha:!useBloom, antialias:true, powerPreference:'low-power'}); }catch(_){ return null; }
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, useBloom?1.6:1.9));
  renderer.setSize(W,H);
  if(useBloom) renderer.setClearColor(0x06040b, 1); else renderer.setClearColor(0x000000, 0);
  renderer.domElement.style.cssText='position:absolute;inset:0;width:100%;height:100%;display:block';
  container.appendChild(renderer.domElement);
  // Opaque dark stage when bloom is on — feather the canvas edges so it melts into the hero.
  container.style.webkitMaskImage = container.style.maskImage =
    useBloom ? 'radial-gradient(closest-side at 50% 50%, #000 66%, rgba(0,0,0,0.4) 84%, transparent 96%)' : '';
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(50, W/H, 0.1, 100);
  camera.position.set(0,0,6.9);

  // ===== build the graph: nodes (cloud services) linked into a live network =====
  const NN = coarse?34:50, HUBS = 4, R = 3.25;
  const cMag=new THREE.Color(0xE6007E), cPink=new THREE.Color(0xFF4DA6), cViol=new THREE.Color(0x7B2CBF), cWhite=new THREE.Color(0xFFE6F2);
  const g3=()=>{ let s=0; for(let k=0;k<3;k++) s+=Math.random(); return (s/3-0.5)*2; };
  const nodes=[]; const tmp=new THREE.Color();
  // hubs spread around the centre (core services / regions)
  for(let i=0;i<HUBS;i++){ const a=(i/HUBS)*6.283+0.5, r=1.3; nodes.push({p:new THREE.Vector3(Math.cos(a)*r, Math.sin(a)*r*0.7, (Math.random()-0.5)), hub:true}); }
  // leaf nodes — spaced sampling inside a flattened sphere (avoids clumping)
  let tries=0;
  while(nodes.length<NN && tries<NN*40){ tries++;
    const v=new THREE.Vector3(g3()*R, g3()*R*0.66, g3()*R*0.9);
    if(v.length()>R*1.02) continue;
    let ok=true; for(let j=0;j<nodes.length;j++){ if(v.distanceTo(nodes[j].p)<0.6){ ok=false; break; } }
    if(ok) nodes.push({p:v, hub:false});
  }
  const N=nodes.length;
  for(let i=0;i<N;i++){ const nd=nodes[i]; const tt=Math.min(1, nd.p.length()/R);
    if(nd.hub){ tmp.copy(cPink); } else { tmp.copy(cViol).lerp(cMag,0.4+0.45*Math.random()).lerp(cPink, Math.random()*Math.random()*0.6); }
    const b=(nd.hub?0.82:(0.92-tt*0.24))*(useBloom?0.92:1.0);
    nd.base=tmp.clone().multiplyScalar(b);
    nd.size=nd.hub?46:(16+Math.random()*13);
    nd.glow=Math.random()*0.3; nd.phase=Math.random()*6.283;
  }

  // edges: local mesh (k nearest) + every leaf spokes to its nearest hub + a hub backbone ring
  const edgeSet=new Set(), edges=[];
  const addEdge=(a,b)=>{ if(a===b) return; const k=a<b?a+'-'+b:b+'-'+a; if(edgeSet.has(k)) return; edgeSet.add(k); edges.push([a,b]); };
  const hubIdx=[]; for(let i=0;i<N;i++) if(nodes[i].hub) hubIdx.push(i);
  for(let i=0;i<N;i++){
    const d=[]; for(let j=0;j<N;j++){ if(j!==i) d.push([j, nodes[i].p.distanceTo(nodes[j].p)]); }
    d.sort((a,b)=>a[1]-b[1]);
    const k=nodes[i].hub?3:2;
    for(let m=0;m<k && m<d.length;m++){ if(d[m][1]<2.6) addEdge(i,d[m][0]); }
    if(!nodes[i].hub && hubIdx.length){ let bh=hubIdx[0], bd=1e9; for(const h of hubIdx){ const dd=nodes[i].p.distanceTo(nodes[h].p); if(dd<bd){ bd=dd; bh=h; } } addEdge(i,bh); }
  }
  for(let i=0;i<hubIdx.length;i++) addEdge(hubIdx[i], hubIdx[(i+1)%hubIdx.length]);
  const otherEnd=(ei,from)=>{ const ed=edges[ei]; return ed[0]===from?ed[1]:ed[0]; };
  const adj=Array.from({length:N},()=>[]);
  edges.forEach((ed,ei)=>{ adj[ed[0]].push([ei,ed[1]]); adj[ed[1]].push([ei,ed[0]]); });

  // ---- edge geometry (faint glowing links) ----
  const epos=new Float32Array(edges.length*6), ecol=new Float32Array(edges.length*6); const eC=new THREE.Color();
  eC.copy(cViol).lerp(cMag,0.55).multiplyScalar(useBloom?0.58:0.7);
  for(let i=0;i<edges.length;i++){ const a=nodes[edges[i][0]].p, b=nodes[edges[i][1]].p;
    epos[i*6]=a.x; epos[i*6+1]=a.y; epos[i*6+2]=a.z; epos[i*6+3]=b.x; epos[i*6+4]=b.y; epos[i*6+5]=b.z;
    for(let s=0;s<2;s++){ ecol[i*6+s*3]=eC.r; ecol[i*6+s*3+1]=eC.g; ecol[i*6+s*3+2]=eC.b; }
  }
  const egeo=new THREE.BufferGeometry();
  egeo.setAttribute('position', new THREE.BufferAttribute(epos,3));
  egeo.setAttribute('color', new THREE.BufferAttribute(ecol,3));
  const emat=new THREE.LineBasicMaterial({vertexColors:true, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, opacity:0.95});
  const lines=new THREE.LineSegments(egeo, emat);

  // ---- shared glowing-dot material (nodes + data pulses) ----
  const dotMat=new THREE.ShaderMaterial({
    uniforms:{ uDpr:{value:renderer.getPixelRatio()} },
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, vertexColors:true,
    vertexShader:'attribute float aSize;uniform float uDpr;varying vec3 vColor;varying float vAlpha;void main(){vColor=color;vec4 mv=modelViewMatrix*vec4(position,1.0);float d=-mv.z;vAlpha=smoothstep(20.0,3.0,d);gl_PointSize=aSize*uDpr*(8.0/d);gl_Position=projectionMatrix*mv;}',
    fragmentShader:'varying vec3 vColor;varying float vAlpha;void main(){vec2 uv=gl_PointCoord-0.5;float r=length(uv);float core=smoothstep(0.5,0.0,r);core*=core;float halo=smoothstep(0.5,0.1,r)*0.42;gl_FragColor=vec4(vColor,(core+halo)*vAlpha);}'
  });

  // ---- node points ----
  const npos=new Float32Array(N*3), ncol=new Float32Array(N*3), nsz=new Float32Array(N);
  for(let i=0;i<N;i++){ const nd=nodes[i]; npos[i*3]=nd.p.x; npos[i*3+1]=nd.p.y; npos[i*3+2]=nd.p.z; ncol[i*3]=nd.base.r; ncol[i*3+1]=nd.base.g; ncol[i*3+2]=nd.base.b; nsz[i]=nd.size; }
  const ngeo=new THREE.BufferGeometry();
  ngeo.setAttribute('position', new THREE.BufferAttribute(npos,3));
  ngeo.setAttribute('color', new THREE.BufferAttribute(ncol,3));
  ngeo.setAttribute('aSize', new THREE.BufferAttribute(nsz,1));
  const nodePts=new THREE.Points(ngeo, dotMat);

  // ---- data pulses travelling along the links (the "alive" signal) ----
  const NP=Math.min(edges.length, coarse?14:26);
  const pulses=[];
  for(let i=0;i<NP;i++){ const ei=(Math.random()*edges.length)|0; const from=edges[ei][Math.random()<0.5?0:1]; pulses.push({ei, from, t:Math.random(), spd:0.34+Math.random()*0.4}); }
  const ppos=new Float32Array(NP*3), pcol=new Float32Array(NP*3), psz=new Float32Array(NP);
  for(let i=0;i<NP;i++){ psz[i]=19+Math.random()*10; const c=Math.random()<0.18?cWhite:cPink; const m=0.74; pcol[i*3]=c.r*m; pcol[i*3+1]=c.g*m; pcol[i*3+2]=c.b*m;
    const pu=pulses[i], a=nodes[pu.from].p, b=nodes[otherEnd(pu.ei,pu.from)].p; ppos[i*3]=a.x+(b.x-a.x)*pu.t; ppos[i*3+1]=a.y+(b.y-a.y)*pu.t; ppos[i*3+2]=a.z+(b.z-a.z)*pu.t; }
  const pgeo=new THREE.BufferGeometry();
  pgeo.setAttribute('position', new THREE.BufferAttribute(ppos,3));
  pgeo.setAttribute('color', new THREE.BufferAttribute(pcol,3));
  pgeo.setAttribute('aSize', new THREE.BufferAttribute(psz,1));
  const pulsePts=new THREE.Points(pgeo, dotMat);

  // ---- soft data haze (atmosphere — the "nube" the network lives in) ----
  const NH = coarse?900:2200;
  const hpos=new Float32Array(NH*3), hcol=new Float32Array(NH*3), hsz=new Float32Array(NH); const hc=new THREE.Color(), hv=new THREE.Vector3();
  for(let i=0;i<NH;i++){ hv.set(g3()*R*1.05, g3()*R*0.7, g3()*R*0.95);
    hpos[i*3]=hv.x; hpos[i*3+1]=hv.y; hpos[i*3+2]=hv.z;
    const tt=Math.min(1, hv.length()/R);
    hc.copy(cViol).lerp(cMag, 0.3+0.5*Math.random()).lerp(cPink, Math.random()*Math.random()*0.5);
    const hb=(0.46-tt*0.22)*(useBloom?0.7:1.0); hcol[i*3]=hc.r*hb; hcol[i*3+1]=hc.g*hb; hcol[i*3+2]=hc.b*hb;
    hsz[i]=3+Math.random()*Math.random()*12;
  }
  const hgeo=new THREE.BufferGeometry();
  hgeo.setAttribute('position', new THREE.BufferAttribute(hpos,3));
  hgeo.setAttribute('color', new THREE.BufferAttribute(hcol,3));
  hgeo.setAttribute('aSize', new THREE.BufferAttribute(hsz,1));
  const hazePts=new THREE.Points(hgeo, dotMat);

  const group=new THREE.Group(); group.add(hazePts); group.add(lines); group.add(nodePts); group.add(pulsePts); scene.add(group);

  let composer=null, bloom=null;
  if(useBloom){ try{ composer=new THREE.EffectComposer(renderer); composer.setSize(W,H); composer.addPass(new THREE.RenderPass(scene,camera)); bloom=new THREE.UnrealBloomPass(new THREE.Vector2(W,H), 0.6, 0.78, 0.2); composer.addPass(bloom); }catch(_){ composer=null; } }

  const PV=new THREE.Vector3();
  const pickEdgeFrom=(node,prev)=>{ const a=adj[node]; if(!a.length) return null; let opts=a.filter(x=>x[1]!==prev); if(!opts.length) opts=a; return opts[(Math.random()*opts.length)|0]; };
  function step(dt,t){
    for(let i=0;i<NP;i++){ const pu=pulses[i]; pu.t+=pu.spd*dt;
      while(pu.t>=1){ pu.t-=1; const arr=otherEnd(pu.ei, pu.from); nodes[arr].glow=Math.min(1.45, nodes[arr].glow+0.85);
        const nx=pickEdgeFrom(arr, pu.from); pu.from=arr; if(nx) pu.ei=nx[0]; }
      const a=nodes[pu.from].p, b=nodes[otherEnd(pu.ei,pu.from)].p; PV.copy(a).lerp(b, pu.t);
      ppos[i*3]=PV.x; ppos[i*3+1]=PV.y; ppos[i*3+2]=PV.z;
    }
    pgeo.attributes.position.needsUpdate=true;
    for(let i=0;i<N;i++){ const nd=nodes[i]; nd.glow=Math.max(0, nd.glow-dt*1.9);
      const tw=0.5+0.5*Math.sin(t*1.3+nd.phase); const lvl=1.0+nd.glow*1.5+tw*0.14;
      ncol[i*3]=nd.base.r*lvl; ncol[i*3+1]=nd.base.g*lvl; ncol[i*3+2]=nd.base.b*lvl;
      nsz[i]=nd.size*(1+nd.glow*0.45);
    }
    ngeo.attributes.color.needsUpdate=true; ngeo.attributes.aSize.needsUpdate=true;
  }

  let raf=0,t0=null,running=true,inView=true,last=-999, mx=0,my=0,tmx=0,tmy=0;
  const onMove=(e)=>{ const r=container.getBoundingClientRect(); tmx=((e.clientX-r.left)/r.width-0.5)*2; tmy=((e.clientY-r.top)/r.height-0.5)*2; };
  window.addEventListener('mousemove', onMove);
  const resize=()=>{ const w=container.clientWidth,h=container.clientHeight; if(w<4||h<4) return; renderer.setSize(w,h); if(composer){composer.setSize(w,h); if(bloom)bloom.setSize(w,h);} camera.aspect=w/h; camera.updateProjectionMatrix(); dotMat.uniforms.uDpr.value=renderer.getPixelRatio(); };
  window.addEventListener('resize', resize);
  function frame(ts){
    if(!running||!inView){ raf=0; return; }
    raf=requestAnimationFrame(frame);
    if(ts-last<33) return;
    const dt=Math.min(0.05,(last<0?16:ts-last)/1000); last=ts;
    if(t0===null) t0=ts; const t=(ts-t0)/1000;
    mx+=(tmx-mx)*0.06; my+=(tmy-my)*0.06;
    step(dt,t);
    const sc=Math.min((window.pageYOffset||0),700)*0.0003;
    group.rotation.y=t*0.06 + mx*0.4; group.rotation.x=my*0.26 + sc; group.scale.setScalar(1+0.02*Math.sin(t*0.7));
    camera.position.x=mx*0.95; camera.position.y=-my*0.6; camera.lookAt(0,0,0);
    if(composer) composer.render(); else renderer.render(scene,camera);
  }
  // paint one frame immediately so the network is visible even before rAF ramps up
  try{ if(composer) composer.render(); else renderer.render(scene,camera); }catch(_){}
  const io=new IntersectionObserver(es=>{ es.forEach(en=>{ inView=en.isIntersecting; if(inView && running && !raf) raf=requestAnimationFrame(frame); }); },{threshold:0});
  io.observe(container);
  raf=requestAnimationFrame(frame);
  return { stop(){ running=false; if(raf) cancelAnimationFrame(raf); io.disconnect(); window.removeEventListener('resize',resize); window.removeEventListener('mousemove',onMove); try{egeo.dispose();emat.dispose();ngeo.dispose();pgeo.dispose();hgeo.dispose();dotMat.dispose();if(bloom&&bloom.dispose)bloom.dispose();if(composer&&composer.dispose)composer.dispose();renderer.dispose();}catch(_){ } if(renderer.domElement.parentNode) renderer.domElement.parentNode.removeChild(renderer.domElement); } };
}

function startAurora(canvas){
  let gl;
  try { gl = canvas.getContext('webgl', {antialias:false, depth:false, stencil:false, alpha:false, powerPreference:'low-power', preserveDrawingBuffer:false}); } catch(_) {}
  if(!gl){ canvas.style.display='none'; return null; }
  const vsSrc = 'attribute vec2 p;void main(){gl_Position=vec4(p,0.0,1.0);}';
  const fsSrc = [
    'precision highp float;',
    'uniform vec2 uRes;uniform float uTime;',
    'float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}',
    'float noise(vec2 p){vec2 i=floor(p),f=fract(p);float a=hash(i),b=hash(i+vec2(1.,0.)),c=hash(i+vec2(0.,1.)),d=hash(i+vec2(1.,1.));vec2 u=f*f*(3.-2.*f);return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}',
    'float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*noise(p);p=p*2.03+vec2(1.7,9.2);a*=.5;}return v;}',
    'void main(){',
    ' vec2 uv=gl_FragCoord.xy/uRes;float asp=uRes.x/uRes.y;vec2 p=vec2(uv.x*asp,uv.y);',
    ' float t=uTime*0.045;',
    ' vec2 q=vec2(fbm(p*1.1+vec2(0.0,t*0.8)),fbm(p*1.1+vec2(3.4,-t)));',
    ' vec2 r=vec2(fbm(p*1.1+1.6*q+vec2(1.7,9.2)+t*0.5),fbm(p*1.1+1.6*q+vec2(8.3,2.8)-t*0.4));',
    ' float f=fbm(p*1.0+1.4*r);',
    ' vec3 c0=vec3(0.031,0.031,0.039);',
    ' vec3 c1=vec3(0.13,0.02,0.17);',
    ' vec3 c2=vec3(0.85,0.0,0.46);',
    ' vec3 c3=vec3(1.0,0.30,0.66);',
    ' vec3 col=c0;',
    ' col=mix(col,c1,smoothstep(0.18,0.9,f)*0.85);',
    ' col=mix(col,c2,smoothstep(0.55,1.12,length(r))*0.5);',
    ' vec2 core=vec2((0.26+0.1*sin(t*1.5))*asp,0.66+0.1*cos(t*1.2));',
    ' float d=exp(-3.4*length(p-core));',
    ' col=mix(col,c3,d*0.32);',
    ' col*=0.42+0.26*f;',
    ' float vig=smoothstep(1.5,0.15,length(uv-0.5));',
    ' col*=mix(0.3,0.82,vig);',
    ' col+=(hash(gl_FragCoord.xy)-0.5)*0.014;',
    ' gl_FragColor=vec4(col,1.0);',
    '}'
  ].join('\n');
  function compile(type, src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s); return s; }
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vsSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fsSrc));
  gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog, gl.LINK_STATUS)){ canvas.style.display='none'; return null; }
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(prog,'p');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog,'uTime');
  const uRes = gl.getUniformLocation(prog,'uRes');
  let raf=0, startTs=null, running=true, inView=true, lastDraw=-999;
  function resize(){
    // The aurora is soft, so render at a capped low resolution (cheap on the GPU,
    // invisible when upscaled) — this keeps scrolling fluid even on retina/full-screen.
    const r=canvas.getBoundingClientRect();
    const cssW=r.width||canvas.clientWidth||0, cssH=r.height||canvas.clientHeight||0;
    if(cssW<2||cssH<2) return; // not laid out yet — wait
    const scl=Math.min(1, 1300/Math.max(cssW,cssH));
    const w=Math.max(2,Math.round(cssW*scl)), h=Math.max(2,Math.round(cssH*scl));
    if(canvas.width!==w||canvas.height!==h){ canvas.width=w; canvas.height=h; gl.viewport(0,0,w,h); }
    gl.uniform2f(uRes, canvas.width, canvas.height);
  }
  function frame(ts){
    if(!running||!inView){ raf=0; return; }
    raf=requestAnimationFrame(frame);
    if(ts-lastDraw < 32) return; // cap ~30fps — the aurora drifts slowly, frees frames for scroll
    lastDraw=ts;
    if(startTs===null) startTs=ts;
    resize();
    gl.uniform1f(uTime,(ts-startTs)/1000);
    gl.drawArrays(gl.TRIANGLES,0,3);
  }
  const io=new IntersectionObserver(es=>{
    es.forEach(en=>{ inView=en.isIntersecting; if(inView && running && !raf){ raf=requestAnimationFrame(frame);} });
  },{threshold:0});
  io.observe(canvas);
  window.addEventListener('resize', resize);
  resize();
  raf=requestAnimationFrame(frame);
  return { stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; io.disconnect(); window.removeEventListener('resize',resize); const ext=gl.getExtension('WEBGL_lose_context'); if(ext) ext.loseContext(); } };
}

/* clients — white-band "lens" carousel: continuous scroll + per-logo scale by distance from center */
function initClientsCarousel(){
  const stage=document.querySelector('[data-cstage]');
  if(!stage) return null;
  const track=stage.querySelector('[data-ctrack]');
  if(!track) return null;
  const logos=Array.from(track.children);
  stage.classList.add('is-carousel'); track.classList.add('is-carousel');
  let segW=0, stageLeft=0, stageCenter=0, half=1, ready=false;
  function measure(){
    segW=track.scrollWidth/2;
    const r=stage.getBoundingClientRect();
    stageLeft=r.left; stageCenter=r.left+r.width/2; half=Math.max(1,r.width/2);
    logos.forEach(l=>{ l._base=l.offsetLeft+l.offsetWidth/2; });
    ready = segW>10;
  }
  let pending=logos.filter(i=>!i.complete).length;
  if(pending===0) measure();
  else logos.forEach(i=>{ if(!i.complete) i.addEventListener('load',()=>{ if(--pending<=0) measure(); },{once:true}); });
  requestAnimationFrame(()=>requestAnimationFrame(measure));
  let offset=0, last=null, raf=0, running=true;
  const SPEED=58;
  function frame(ts){
    if(!running){ raf=0; return; }
    if(!ready){ raf=requestAnimationFrame(frame); return; }
    if(last==null) last=ts;
    const dt=Math.min(0.05,(ts-last)/1000); last=ts;
    offset=(offset+SPEED*dt)%segW;
    track.style.transform='translateX('+(-offset).toFixed(2)+'px)';
    for(let i=0;i<logos.length;i++){
      const l=logos[i];
      const sc=stageLeft+l._base-offset;
      let d=Math.abs(sc-stageCenter)/(half*0.6); if(d>1) d=1;
      const tt=1-d, ease=tt*tt*(3-2*tt);
      l.style.transform='scale('+(0.72+0.83*ease).toFixed(3)+')';
      l.style.zIndex=(ease*100)|0;
    }
    raf=requestAnimationFrame(frame);
  }
  const onR=()=>measure();
  window.addEventListener('resize',onR);
  raf=requestAnimationFrame(frame);
  return { stop(){ running=false; if(raf) cancelAnimationFrame(raf); window.removeEventListener('resize',onR); } };
}

function teardownFilm(){
  try { if(film.mm){ film.mm.revert(); film.mm=null; } } catch(_){}
  film.splits.forEach(s=>{ try{ s.revert(); }catch(_){} });
  film.splits=[];
  if(film.shader){ try{ film.shader.stop(); }catch(_){} film.shader=null; }
  if(film.cloud){ try{ film.cloud.stop(); }catch(_){} film.cloud=null; }
  if(film.carousel){ try{ film.carousel.stop(); }catch(_){} film.carousel=null; }
  if(window.ScrollTrigger){ ScrollTrigger.getAll().forEach(st=>{ try{ st.kill(); }catch(_){} }); }
}

function initFilm(){
  if(!window.gsap){ return; }              // CDN unavailable -> static site, everything visible

  // hero aurora (only if a hero canvas is present, i.e. home)
  const canvas=document.getElementById('nbHero');
  const fallback=document.querySelector('[data-hero-fallback]');
  if(canvas){
    if(prefersReduce()){ canvas.style.display='none'; }
    else { film.shader=startAurora(canvas); if(film.shader && fallback){ fallback.style.opacity='0'; } }
  }

  // hero 3D particle cloud (replaces the flat diagram; the SVG diagram is the fallback)
  const cloudEl=document.getElementById('nbCloud');
  const heroSvg=document.querySelector('.nb-art');
  if(cloudEl && !prefersReduce()){ film.cloud=startNetwork(cloudEl); }
  if(heroSvg){ heroSvg.style.display = film.cloud ? 'none' : 'block'; }

  const mm=gsap.matchMedia();
  film.mm=mm;
  const h1=document.querySelector('[data-hero-h1]');

  mm.add({
    isMotion:'(prefers-reduced-motion: no-preference)',
    isReduce:'(prefers-reduced-motion: reduce)',
    isDesk:'(min-width: 981px) and (pointer: fine)'
  }, (ctx)=>{
    const { isReduce, isDesk } = ctx.conditions;
    const cleanups=[];

    if(isReduce){
      gsap.set('[data-reveal]', {opacity:1, y:0, clearProps:'opacity,transform'});
      gsap.set('[data-reveal-pop]', {opacity:1, y:0, scale:1, clearProps:'opacity,transform'});
      if(h1) gsap.set(h1,{autoAlpha:1});
      document.querySelectorAll('[data-countup]').forEach(el=>{ el.textContent=el.getAttribute('data-countup')+(el.getAttribute('data-suffix')||''); });
      return;
    }

    // hero headline — SplitText line mask
    if(h1){
      if(window.SplitText){
        const split=new SplitText(h1,{type:'lines',linesClass:'nb-line',autoSplit:true});
        film.splits.push(split);
        split.lines.forEach(l=>{ l.style.display='block'; l.style.overflow='hidden'; });
        gsap.set(h1,{autoAlpha:1});
        gsap.from(split.lines,{yPercent:115,opacity:0,duration:0.9,ease:'expo.out',stagger:0.09,delay:0.06});
      } else {
        gsap.fromTo(h1,{autoAlpha:0,y:24},{autoAlpha:1,y:0,duration:0.8,ease:'power3.out'});
      }
    }

    // generic scroll reveals — batched so siblings entering together cascade (varied choreography)
    const RV={left:{x:-44,y:0},right:{x:44,y:0},up:{x:0,y:30},pop:{x:0,y:22,scale:.94}};
    ScrollTrigger.batch('[data-reveal]', {
      start:'top 88%', once:true,
      onEnter: b => b.forEach((el,i)=>{ const f=RV[el.getAttribute('data-reveal')]||RV.up; gsap.fromTo(el, Object.assign({opacity:0},f), {opacity:1,x:0,y:0,scale:1,duration:0.78,ease:'power3.out',delay:i*0.06,overwrite:true,clearProps:'transform'}); })
    });

    // partner cards — pop in one by one when the grid actually scrolls into view
    const pgrid=document.querySelector('.partner-grid');
    if(pgrid){
      const pcards=gsap.utils.toArray('[data-reveal-pop]', pgrid);
      gsap.fromTo(pcards, {opacity:0,y:42,scale:0.82}, {opacity:1,y:0,scale:1,duration:0.8,ease:'back.out(1.6)',stagger:0.12,overwrite:true,
        scrollTrigger:{ trigger:pgrid, start:'top 78%', once:true }});
    }

    // partners — magenta cursor spotlight (fine pointer only)
    if(isDesk){
      const psec=document.querySelector('[data-partners]');
      if(psec){
        const onMove=(ev)=>{ const r=psec.getBoundingClientRect(); psec.style.setProperty('--mx', ((ev.clientX-r.left)/r.width*100).toFixed(1)+'%'); psec.style.setProperty('--my', ((ev.clientY-r.top)/r.height*100).toFixed(1)+'%'); };
        psec.addEventListener('mousemove', onMove);
        cleanups.push(()=>psec.removeEventListener('mousemove', onMove));
      }
    }

    // count-up numbers
    document.querySelectorAll('[data-countup]').forEach(el=>{
      const target=parseFloat(el.getAttribute('data-countup'))||0;
      const suf=el.getAttribute('data-suffix')||'';
      const o={v:0};
      gsap.to(o,{v:target,duration:1.7,ease:'power2.out',snap:{v:1},
        onUpdate(){ el.textContent=Math.round(o.v)+suf; },
        scrollTrigger:{trigger:el,start:'top 82%',once:true}});
    });

    // magnetic buttons (fine pointer only)
    if(isDesk){
      document.querySelectorAll('[data-magnetic]').forEach(el=>{
        const xTo=gsap.quickTo(el,'x',{duration:0.4,ease:'elastic.out(1,0.4)'});
        const yTo=gsap.quickTo(el,'y',{duration:0.4,ease:'elastic.out(1,0.4)'});
        const move=(ev)=>{ const r=el.getBoundingClientRect(); xTo((ev.clientX-(r.left+r.width/2))*0.35); yTo((ev.clientY-(r.top+r.height/2))*0.35); };
        const leave=()=>{ xTo(0); yTo(0); };
        el.addEventListener('mousemove',move);
        el.addEventListener('mouseleave',leave);
        cleanups.push(()=>{ el.removeEventListener('mousemove',move); el.removeEventListener('mouseleave',leave); gsap.set(el,{x:0,y:0}); });
      });
      // glass cards — magenta sheen that follows the cursor (echoes the hero network)
      document.querySelectorAll('.glass-i').forEach(card=>{
        const m=(ev)=>{ const r=card.getBoundingClientRect(); card.style.setProperty('--cx',((ev.clientX-r.left)/r.width*100).toFixed(1)+'%'); card.style.setProperty('--cy',((ev.clientY-r.top)/r.height*100).toFixed(1)+'%'); };
        card.addEventListener('mousemove',m);
        cleanups.push(()=>card.removeEventListener('mousemove',m));
      });
    }

    // SIGNATURE — horizontal pinned services act (desktop) / vertical reveal (mobile)
    const act=document.querySelector('[data-svc-act]');
    const track=document.getElementById('svcTrack');
    if(act && track){
      if(isDesk){
        const vp=act.querySelector('.svc-viewport');
        const fill=act.querySelector('[data-rail-fill]');
        const label=act.querySelector('[data-rail-label]');
        const names=gsap.utils.toArray('.svc-panel',track).map(p=>p.getAttribute('data-name')||'');
        const dist=()=> Math.max(0, track.scrollWidth - (vp?vp.clientWidth:window.innerWidth));
        let cur=-1;
        gsap.to(track,{x:()=>-dist(),ease:'none',
          scrollTrigger:{trigger:act,pin:true,scrub:0.5,start:'top top',
            end:()=>'+='+dist(), invalidateOnRefresh:true, anticipatePin:1,
            onUpdate(self){
              const pr=self.progress;
              if(fill) fill.style.width=(pr*100).toFixed(1)+'%';
              const idx=Math.min(names.length-1, Math.floor(pr*names.length+0.0001));
              if(idx!==cur && label){ cur=idx; label.textContent=('0'+(idx+1))+' / 0'+names.length+' · '+names[idx]; }
            }
          }});
      } else {
        gsap.utils.toArray('.svc-panel',track).forEach(p=>{
          gsap.fromTo(p,{opacity:0,y:24},{opacity:1,y:0,duration:0.7,ease:'power3.out',
            scrollTrigger:{trigger:p,start:'top 88%',once:true}});
        });
      }
    }

    return ()=>{ cleanups.forEach(fn=>fn()); };
  });

  if(!prefersReduce()){ film.carousel=initClientsCarousel(); }

  if(window.ScrollTrigger){ requestAnimationFrame(()=>{ try{ ScrollTrigger.refresh(); }catch(_){} }); }
}

/* ---------- render lifecycle ---------- */
function syncFormFromDOM(){
  if(state.page!=='contact' || state.sent) return;
  ['name','email','company','message'].forEach(n=>{
    const el=app.querySelector('[name="'+n+'"]');
    if(el) state.form[n]=el.value;
  });
}

function applyView(){
  syncFormFromDOM();
  teardownFilm();
  app.innerHTML = view();
  document.documentElement.lang = state.lang;
  document.title = state.lang==='es'
    ? 'Nubilink — Soluciones innovadoras en la nube'
    : 'Nubilink — Innovative solutions in the cloud';
  initFilm();
  if(window.__nbProg) requestAnimationFrame(window.__nbProg);
}

function scrollTop(){
  if(lenis){ lenis.scrollTo(0,{immediate:true}); }
  else { window.scrollTo(0,0); }
}

function render(opts){
  opts = opts || {};
  const fade = opts.fade && window.gsap && !prefersReduce();
  if(fade){
    gsap.to(app,{autoAlpha:0,duration:0.16,ease:'power1.in',onComplete(){
      applyView();
      if(opts.top) scrollTop();
      gsap.fromTo(app,{autoAlpha:0},{autoAlpha:1,duration:0.26,ease:'power1.out'});
    }});
  } else {
    applyView();
    if(opts.top) scrollTop();
  }
}

function go(page){
  state.page=page;
  state.menuOpen=false;
  render({fade:true, top:true});
}

/* ---------- events (delegated, survive re-render) ---------- */
app.addEventListener('click', (ev)=>{
  const trigger=ev.target.closest('[data-act]');
  if(!trigger || !app.contains(trigger)) return;
  const act=trigger.getAttribute('data-act');
  if(act==='home'||act==='about'||act==='services'||act==='contact'){ go(act); }
  else if(act==='toggleLang'){ state.lang = state.lang==='es' ? 'en' : 'es'; render({fade:true}); }
  else if(act==='toggleMenu'){ state.menuOpen=!state.menuOpen; applyView(); }
  else if(act==='resetForm'){ state.sent=false; state.showErr=false; state.deliver=''; state.form={name:'',email:'',company:'',message:''}; applyView(); }
});

function openMailto(f){
  const subject=encodeURIComponent('Contacto desde la web — '+(f.company||f.name||'Nubilink'));
  const body=encodeURIComponent('Nombre: '+f.name+'\nEmail: '+f.email+'\nEmpresa: '+(f.company||'-')+'\n\n'+f.message);
  try{ window.location.href='mailto:info@nubilink.com?subject='+subject+'&body='+body; }catch(_){}
}
async function deliverForm(f){
  const key=(FORM_ACCESS_KEY||'').trim();
  if(key){
    try{
      const res=await fetch('https://api.web3forms.com/submit',{method:'POST',headers:{'Content-Type':'application/json',Accept:'application/json'},
        body:JSON.stringify({access_key:key, subject:'Nuevo contacto desde nubilink.com', from_name:f.name, name:f.name, email:f.email, company:f.company, message:f.message})});
      const data=await res.json().catch(()=>null);
      if(data && data.success) return 'sent';
    }catch(_){}
  }
  openMailto(f);
  return 'mailto';
}

app.addEventListener('submit', async (ev)=>{
  if(!ev.target.matches('[data-nbform]')) return;
  ev.preventDefault();
  syncFormFromDOM();
  const f={...state.form};
  const emailOk=/.+@.+\..+/.test(f.email);
  if(!f.name.trim() || !emailOk || !f.message.trim()){ state.showErr=true; applyView(); return; }
  state.showErr=false;
  const btn=ev.target.querySelector('button[type="submit"]');
  if(btn){ btn.disabled=true; btn.style.opacity='0.65'; btn.style.pointerEvents='none'; }
  const mode=await deliverForm(f);
  state.deliver=mode; state.sent=true; applyView(); scrollTop();
});

/* ---------- scroll progress bar (global, persists across SPA re-renders) ---------- */
function setupProgress(){
  if(document.getElementById('nbProgress')) return;
  const bar=document.createElement('div');
  bar.id='nbProgress'; bar.setAttribute('aria-hidden','true');
  bar.style.cssText='position:fixed;top:0;left:0;height:3px;width:100%;transform:scaleX(0);transform-origin:0 50%;background:linear-gradient(90deg,#E6007E,#FF4DA6);box-shadow:0 0 12px rgba(255,77,166,.7);z-index:100;pointer-events:none;will-change:transform';
  document.body.appendChild(bar);
  let ticking=false;
  const upd=()=>{ ticking=false; const h=document.documentElement; const max=(h.scrollHeight-h.clientHeight)||1; const p=Math.min(1,Math.max(0,(window.pageYOffset||h.scrollTop||0)/max)); bar.style.transform='scaleX('+p.toFixed(4)+')'; };
  const onScroll=()=>{ if(!ticking){ ticking=true; requestAnimationFrame(upd); } };
  window.addEventListener('scroll', onScroll, {passive:true});
  window.addEventListener('resize', onScroll, {passive:true});
  window.__nbProg=upd; upd();
}

/* ---------- boot (after deferred CDN libs have loaded) ---------- */
function boot(){
  if(window.gsap){
    if(window.ScrollTrigger) gsap.registerPlugin(ScrollTrigger);
    if(window.SplitText) gsap.registerPlugin(SplitText);
    document.documentElement.classList.add('gsap-ready');
    // Native scroll (Apple-style momentum) — no JS smooth-scroll layer.
    // ScrollTrigger listens to native scroll directly.
    gsap.ticker.lagSmoothing(0);
  }
  applyView();
  setupProgress();
}

if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded', boot); }
else { boot(); }
</script>
