function view(){
  const t = LANG[state.lang];
  let page = '';
  if (state.page === 'home') page = homePage(t);
  else if (state.page === 'services') page = servicesPage(t);
  else if (state.page === 'about') page = aboutPage(t);
  else if (state.page === 'contact') page = contactPage(t);
  return `<div style="min-height:100vh;display:flex;flex-direction:column;background:#0A0A0C">
    ${navBar(t)}
    <main style="flex:1">${page}</main>
    ${footer(t)}
  </div>`;
}

/* ---------- runtime ---------- */
const app = document.getElementById('app');

function syncFormFromDOM(){
  if (state.page !== 'contact' || state.sent) return;
  ['name','email','company','message'].forEach(n => {
    const el = app.querySelector('[name="'+n+'"]');
    if (el) state.form[n] = el.value;
  });
}

function render(){
  syncFormFromDOM();
  app.innerHTML = view();
  document.documentElement.lang = state.lang;
  document.title = state.lang === 'es'
    ? 'Nubilink — Soluciones innovadoras en la nube'
    : 'Nubilink — Innovative solutions in the cloud';
}

function go(page){
  state.page = page;
  state.menuOpen = false;
  render();
  window.scrollTo(0, 0);
}

app.addEventListener('click', (ev) => {
  const trigger = ev.target.closest('[data-act]');
  if (!trigger || !app.contains(trigger)) return;
  const act = trigger.getAttribute('data-act');
  if (act === 'home' || act === 'about' || act === 'services' || act === 'contact') {
    go(act);
  } else if (act === 'toggleLang') {
    state.lang = state.lang === 'es' ? 'en' : 'es';
    render();
  } else if (act === 'toggleMenu') {
    state.menuOpen = !state.menuOpen;
    render();
  } else if (act === 'resetForm') {
    state.sent = false;
    state.showErr = false;
    state.form = { name:'', email:'', company:'', message:'' };
    render();
  }
});

app.addEventListener('submit', (ev) => {
  if (!ev.target.matches('[data-nbform]')) return;
  ev.preventDefault();
  syncFormFromDOM();
  const f = state.form;
  const emailOk = /.+@.+\..+/.test(f.email);
  if (!f.name.trim() || !emailOk || !f.message.trim()) {
    state.showErr = true;
    render();
    return;
  }
  state.sent = true;
  state.showErr = false;
  render();
  window.scrollTo(0, 0);
});

render();
</script>
